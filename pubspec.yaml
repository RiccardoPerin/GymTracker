name: gym_tracker
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.15.0
  google_fonts:
  provider: ^6.1.2
  table_calendar: ^3.1.2
  shared_preferences: ^2.3.0
  liquid_glass_bar: ^0.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons:

flutter:
  uses-material-design: true
  assets: 
    - assets/exercises.json

flutter_icons:
  ios: true
  image_path: "assets/logo.png"
  remove_alpha_ios: true
